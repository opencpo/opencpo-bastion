# OpenCPO Gateway — Kernel Hardening
# Applied via: sysctl -p /etc/sysctl.d/99-opencpo.conf

# ── Network hardening ─────────────────────────────────────────────────────────

# Disable IP forwarding (Pi is not a router — Tailscale handles tunneling internally)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Ignore ICMP broadcast requests
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Enable reverse path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Don't accept ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# Don't send ICMP redirects (we're not a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log suspicious martian packets
net.ipv4.conf.all.log_martians = 1

# Protect against SYN flood attacks
net.ipv4.tcp_syncookies = 1

# Disable IPv6 if not needed (most Pi deployments are IPv4-only LAN)
# Comment out if you need IPv6
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1

# ── Memory / performance (Pi Zero 2W: 512MB RAM) ──────────────────────────────

# Reduce swappiness — avoid thrashing SD card
vm.swappiness = 10

# Reduce dirty page ratio — write sooner, smaller bursts
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# ── File system ───────────────────────────────────────────────────────────────

# Protect hardlinks and symlinks
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Increase file descriptor limit for WebSocket proxy
fs.file-max = 65536
